<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contacto • Smulever Web Consulting</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-brand">Smulever Web Consulting</div>
    <nav class="site-nav">
      <a href="index.html">Inicio</a>
      <a href="about.html">Nosotros</a>
      <a href="contact.html">Contacto</a>
    </nav>
  </header>

  <main class="page">
    <section class="content-panel">
      <h2>Contacto</h2>
      <p>Zona Oeste GBA, Argentina • Email: <a href="mailto:distribuidorajs@gmail.com">distribuidorajs@gmail.com</a></p>
      <div class="contact-form-vertical">
        <label>
          Nombre o empresa
          <input type="text" placeholder="Ej. Compañía Zona Oeste" />
        </label>
        <label>
          Área / dominio
          <select>
            <option>Operaciones</option>
            <option>Tecnología</option>
            <option>Datos</option>
            <option>Seguridad</option>
          </select>
        </label>
        <label>
          Correo electrónico
          <input type="email" placeholder="contacto@empresa.com" />
        </label>
        <label>
          Urgencia
          <select>
            <option>Muy urgente</option>
            <option>30 días</option>
            <option>+30 días</option>
          </select>
        </label>
        <label>
          Describe el desafío
          <textarea rows="4" placeholder="Contanos qué proceso complejo querés automatizar o integrar"></textarea>
        </label>
        <button class="btn-primary">Solicitar diagnóstico</button>
      </div>
      <p class="info-note">
        Revisaremos tu solicitud, aplicamos un filtro de demanda y te respondemos con un plan o invitación a llamada si el caso cumple el umbral.
      </p>
    </section>
  </main>
</body>
</html>
